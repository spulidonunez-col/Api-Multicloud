<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Multi-Cloud - Items</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Gestión de Items</h1>
        <p class="subtitle">Multi-Cloud Active-Active Demo</p>

        <!-- Formulario -->
         
        <div class="form-container">
            <h2>Crear Nuevo Item</h2>
            <form id="itemForm">
                <input type="text" id="name" placeholder="Nombre" required>
                <input type="text" id="description" placeholder="Descripción (opcional)">
                <button type="submit">Agregar</button>
            </form>
        </div>

        <!-- Lista de items -->
        <div class="items-container">
            <h2>Lista de Items</h2>
            <table id="itemsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="itemsBody">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: psqluser
      POSTGRES_PASSWORD: Colombia2026
      POSTGRES_DB: DemoApi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psqluser"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://psqluser:Colombia2026@db:5432/DemoApi
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app/backend/src:/app/src
      - ./app/frontend:/app/frontend

volumes:
  postgres_data:
name: Deploy to AWS

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'terraform/aws/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/ecr-aws-app:latest"
          docker build -t $IMAGE -f app/backend/Dockerfile app/backend
          docker push $IMAGE

      - name: Deploy to EC2
        run: |
          aws ec2 run-instances \
            --image-id ami-0c7217cdde317cfec \
            --instance-type t3.micro \
            --key-name linktic-key \
            --security-group-ids sg-xxxxx \
            --subnet-id subnet-xxxxx \
            --user-data "#!/bin/bash
              docker pull ${{ steps.login-ecr.outputs.registry }}/ecr-aws-app:latest
              docker run -d -p 8000:8000 \
                -e DATABASE_URL=${{ secrets.AWS_DB_URL }} \
                ${{ steps.login-ecr.outputs.registry }}/ecr-aws-app:latest"
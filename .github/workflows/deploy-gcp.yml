name: Deploy to GCP

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'terraform/gcp/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push Image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ar-gcp-app/gcp-demo-api:${{ github.sha }}"
          docker build -t $IMAGE -f app/backend/Dockerfile app/backend
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy linktic-api \
            --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ar-gcp-app/gcp-demo-api:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --set-env-vars "DATABASE_URL=postgresql://psqluser:Colombia2026@${{ secrets.DB_PUBLIC_IP }}:5432/DemoApi"
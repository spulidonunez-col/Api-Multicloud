name: Deploy to GCP

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'terraform/gcp/**'

env:
  APP_NAME: gcp-mcapp
  REGION: us-central1
  PROJECT_ID: gcp-msapp
  REPO_NAME: gcp-mcapp-repo
  SERVICE_NAME: gcp-mcapp-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          LATEST_IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest"
          
          docker build -t $IMAGE -f app/backend/Dockerfile app/backend
          docker tag $IMAGE $LATEST_IMAGE
          
          docker push $IMAGE
          docker push $LATEST_IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --set-env-vars "DATABASE_URL=postgresql://psqluser:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_PUBLIC_IP }}:5432/DemoApi"